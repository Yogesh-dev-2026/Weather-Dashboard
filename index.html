<!DOCTYPE html> 
<html lang="en" data-theme="dark"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title> 
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>   
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>   
</body>
    <div class="dashboard-container">
        <header class="control-header">
            <div class="search-wrapper">
                <ion-icon name="search-outline" class="search-icon"></ion-icon>
                <input type="text" id="city-search" placeholder="Search for a city..." autocomplete="off">
                <button id="search-btn">Search</button>
            </div>
            <div class="action-buttons">
                <button id="geo-btn" title="Use current location">
                    <ion-icon name="locate-outline"></ion-icon>
                </button>
                <button id="theme-toggle" title="toggle theme">
                    <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
                </button>
            </div>
        </header>

        <!--shows while fetching weather data-->
        <div id="loading-state" class="loader hidden">
            <div class="spinner"></div>
             <p>Loading weather data...</p>
        </div>

        <!--shows when something goes wrong-->
        <div id="error" class="error">
            <ion-icon name="alert-circle-outline" class="error-icon"></ion-icon>
            <p id="error-message">Something went wrong. Please try again.</p>
        </div>
        
        <main id ="weather-dashboard" class="dashboard hidden">
            <section class="current-weather">
                <div class="location">
                    <h2 id="city-name">City Name</h2>
                    <p id="country-name">Country</p>
                </div>
                <div class="weather-info">
                    <img id="weather-icon" src="" alt="Weather Icon">
                    <div class="temperature">
                        <h1 id="temperature">0°C</h1>
                        <p id="weather-description">Description</p>
                    </div>
                </div>
            </section>

            <section class="forecast">
                <h3>5-Day Forecast</h3>
                <div id="forecast-cards" class="forecast-cards"></div>
            </section>
      <main>
    </div>
</body>
</html>
